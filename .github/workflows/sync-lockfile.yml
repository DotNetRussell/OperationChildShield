name: Sync package-lock on fix branch

on:
  workflow_dispatch:
  push:
    branches: [fix/restore-docker-build]
    paths:
      - frontend/package.json
      - .github/workflows/sync-lockfile.yml

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7
        with:
          ref: fix/restore-docker-build
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Install and refresh lock
        working-directory: frontend
        run: npm install
      - name: Commit lockfile if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add frontend/package-lock.json
          if git diff --staged --quiet; then
            echo "No lockfile changes"
          else
            git commit -m "Refresh package-lock for TypeScript 5.9 and react-dom 19.2.7"
            git push origin HEAD:fix/restore-docker-build
          fi
